<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le zoo des Webeux</title>

    <script
      type="module"
      src="https://unpkg.com/@splinetool/viewer@1.0.28/build/spline-viewer.js"
    ></script>

    <style>
      :root {
        --bg: #0b0f14;
        --card: #121821;
        --card-light: #161d27;

        --text: #e8edf3;
        --text-muted: #8a93a3;

        --border: rgba(255, 255, 255, 0.06);

        --accent: #22c55e;

        --radius: 18px;

        --shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 50px 30px 80px;

        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial;

        background: radial-gradient(circle at top, #111722, #070b10);

        color: var(--text);

        min-height: 100vh;
      }

      /* HEADER */

      header {
        text-align: center;

        margin-bottom: 60px;
      }

      h1 {
        font-size: 3rem;

        margin-bottom: 8px;

        letter-spacing: -1px;
      }

      p {
        color: var(--text-muted);

        font-style: normal;
      }

      /* GRID */

      .farm-grid {
        display: grid;

        grid-template-columns: repeat(4, 1fr);

        gap: 28px;

        max-width: 1200px;

        margin: 0 auto;
      }

      /* CARD */

      .animal-card {
        background: var(--card);

        border-radius: var(--radius);

        border: 1px solid var(--border);

        height: 350px;

        display: flex;

        flex-direction: column;

        overflow: hidden;

        box-shadow: var(--shadow);

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          border 0.25s ease;
      }

      .animal-card:hover {
        transform: translateY(-8px);

        border-color: rgba(34, 197, 94, 0.5);

        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.7);
      }

      /* SPLINE */

      spline-viewer {
        width: 100%;

        height: 80%;

        background: #0e141c;
      }

      /* STUDENT */

      .student-info {
        height: 20%;

        display: flex;

        align-items: center;

        justify-content: center;

        background: var(--card-light);

        border-top: 1px solid var(--border);
      }

      .student-name {
        font-weight: 600;

        font-size: 1.05rem;

        letter-spacing: 0.3px;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        .farm-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 500px) {
        .farm-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
